name: Atualizar Dashboard Copa

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar libs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar script
        run: python generate.py

      - name: Commit e push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "update automático dashboard" || echo "sem mudanças"
          git push
